---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: music
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: 'true'
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          navidrome:
            image:
              repository: deluan/navidrome
              tag: 0.62.0
            envFrom:
              - configMapRef:
                  name: navidrome
            env:
              ND_DEFAULTTHEME: Spotify-ish
              ND_ENABLEINSIGHTSCOLLECTOR: "false"
              TZ: ${TZ}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 300Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
    service:
      main:
        controller: main
        ports:
          http:
            port: 4533
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      music:
        enabled: true
        type: nfs
        server: 10.99.99.151
        path: /volume2/media/music
        globalMounts:
          - path: /music
            readOnly: true
      data:
        enabled: true
        existingClaim: navidrome-data
        advancedMounts:
          main:
            navidrome:
              - path: /data
    route:
      main:
        hostnames:
          - navidrome.${HOMELAB_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
