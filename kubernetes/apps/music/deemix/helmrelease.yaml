---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deemix
  namespace: music
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          deemix:
            image:
              repository: adityathebe/deemix
              tag: v1.0.0
              pullPolicy: IfNotPresent
            env:
              TZ: ${TZ}
              DEEMIX_SINGLE_USER: true
            resources:
              requests:
                cpu: 50m
                memory: 50Mi
              limits:
                memory: 200Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
    service:
      main:
        controller: main
        ports:
          http:
            port: 6595
    persistence:
      downloads:
        enabled: true
        type: nfs
        server: 10.99.99.151
        path: /volume2/media/music
      config:
        enabled: true
        existingClaim: deemix
        globalMounts:
          - path: /config
    route:
      main:
        hostnames:
          - deemix.${HOMELAB_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
