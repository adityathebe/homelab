---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fernrss
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            envFrom: &envFrom
              - secretRef:
                  name: rss-reader
        containers:
          fern:
            image:
              repository: git.${HOMELAB_DOMAIN}/aditya/fern
              tag: latest
            env:
              ADDR: :8181
              ARTICLE_CACHE_DIR: /app/data/cache
              DB_DRIVER: postgres
              POLL_INTERVAL: 15m
              PUBLIC_BASE_URL: "https://fern.${HOMELAB_DOMAIN}"
              REGISTRATION_MODE: disabled
              TZ: ${TZ}
            envFrom: *envFrom
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
    service:
      main:
        controller: main
        ports:
          http:
            port: 8181
    persistence:
      data:
        existingClaim: fernrss-cache
        globalMounts:
          - path: /app/data/cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      main:
        hostnames:
          - "fern.${HOMELAB_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
