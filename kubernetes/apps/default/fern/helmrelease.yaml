---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fern
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    controllers:
      main:
        forceRename: "{{ .Release.Name }}"
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            envFrom:
              - secretRef:
                  name: fern-db
        containers:
          fern:
            image:
              repository: git.${HOMELAB_DOMAIN}/aditya/fern
              tag: latest
            env:
              ADDR: :8181
              ARTICLE_CACHE_DIR: /app/data/cache
              DB_DRIVER: postgres
              POLL_INTERVAL: 15m
              PUBLIC_BASE_URL: "https://fern.${HOMELAB_DOMAIN}"
              REGISTRATION_MODE: disabled
              TZ: ${TZ}
            envFrom:
              - secretRef:
                  name: fern
              - secretRef:
                  name: fern-db
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      admin:
        strategy: Recreate
        containers:
          fern-admin:
            image:
              repository: git.${HOMELAB_DOMAIN}/aditya/fern-admin
              tag: latest
            env:
              ADMIN_ADDR: :8182
              ADMIN_ALLOWED_HOSTS: "fern-admin.${HOMELAB_DOMAIN}"
              TZ: ${TZ}
            envFrom:
              - secretRef:
                  name: fern-admin
              - secretRef:
                  name: fern-db
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      riverui:
        strategy: Recreate
        containers:
          riverui:
            image:
              repository: ghcr.io/riverqueue/riverui
              tag: 0.16.0
            env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: fern-db
                    key: DATABASE_URL
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
    service:
      main:
        forceRename: "{{ .Release.Name }}"
        controller: main
        ports:
          http:
            port: 8181
      admin:
        controller: admin
        ports:
          http:
            port: 8182
      riverui:
        controller: riverui
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: fernrss-cache
        advancedMounts:
          main:
            fern:
              - path: /app/data/cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      main:
        forceRename: "{{ .Release.Name }}"
        hostnames:
          - "fern.${HOMELAB_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
      admin:
        hostnames:
          - "fern-admin.${HOMELAB_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: admin
                port: http
      riverui:
        hostnames:
          - "fernjobs.${HOMELAB_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: riverui
                port: http
