---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radicale
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    controllers:
      radicale:
        annotations:
          reloader.stakater.com/auto: 'true'
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: 'OnRootMismatch'
        containers:
          app:
            image:
              repository: tomsquest/docker-radicale
              tag: 3.7.1.0
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 21m
                memory: 192Mi
              limits:
                memory: 1024Mi
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
    service:
      app:
        controller: radicale
        ports:
          http:
            port: 5232
    persistence:
      config:
        type: configMap
        name: radicale-configmap
        globalMounts:
          - path: /config/config
            subPath: config.cfg
            readOnly: true
      data:
        existingClaim: radicale-data
        advancedMounts:
          radicale:
            app:
              - path: /data
      auth:
        type: secret
        name: radicale
        globalMounts:
          - path: /config/users
            subPath: users
            readOnly: true
    route:
      app:
        hostnames:
          - radicale.${HOMELAB_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
