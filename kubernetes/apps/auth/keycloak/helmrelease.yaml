---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  interval: 30m
  chart:
    spec:
      chart: keycloak
      version: 25.2.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    production: true
    proxyHeaders: xforwarded
    auth:
      adminUser: admin
      existingSecret: keycloak-admin
      passwordSecretKey: admin-password
    postgresql:
      enabled: false
    externalDatabase:
      host: keycloak-rw.auth.svc.cluster.local
      port: 5432
      user: keycloak
      database: keycloak
      existingSecret: keycloak-app
      existingSecretPasswordKey: password
    service:
      type: ClusterIP
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    resourcesPreset: none
    resources:
      requests:
        cpu: 100m
        memory: 768Mi
      limits:
        memory: 1536Mi
