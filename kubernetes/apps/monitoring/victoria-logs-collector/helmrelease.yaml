# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: victoria-logs-collector
    podMonitor:
      enabled: true
    remoteWrite:
      - url: http://victoria-logs-server.monitoring.svc.cluster.local:9428
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    tolerations:
      - operator: Exists
        effect: NoSchedule
