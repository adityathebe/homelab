---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iperf3-exporter-dashboard
  labels:
    grafana_dashboard: "1"
data:
  iperf3-exporter.json: |
    {
      "uid": "iperf3-nas",
      "title": "iperf3 NAS Bandwidth",
      "tags": ["iperf3", "network", "nas"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(iperf3_up{target=\"10.99.99.151\",port=\"5201\"}, instance)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "current": {"selected": true, "text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "K3s node → UGreen NAS bandwidth",
          "description": "iperf3 client tests from each K3s node to 10.99.99.151:5201. Red threshold is below 350Mbps.",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 350}
                ]
              }
            }
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}},
          "targets": [
            {
              "refId": "A",
              "expr": "iperf3_sent_bytes{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"} / iperf3_sent_seconds{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"} * 8 / 1000000",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Latest bandwidth",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 6, "w": 12, "x": 0, "y": 9},
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 350}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto"},
          "targets": [
            {
              "refId": "A",
              "expr": "last_over_time(iperf3_sent_bytes{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"}[75m]) / last_over_time(iperf3_sent_seconds{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"}[75m]) * 8 / 1000000",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Probe status",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 9},
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "mappings": [
                {"type": "value", "options": {"0": {"text": "Down", "color": "red"}, "1": {"text": "Up", "color": "green"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "targets": [
            {
              "refId": "A",
              "expr": "last_over_time(iperf3_up{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"}[75m])",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "TCP retransmits",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 9},
          "fieldConfig": {"defaults": {"unit": "none", "min": 0}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}},
          "targets": [
            {
              "refId": "A",
              "expr": "last_over_time(iperf3_retransmits{target=\"10.99.99.151\",port=\"5201\",instance=~\"$node\"}[75m])",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Exporter probe duration",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 15},
          "fieldConfig": {"defaults": {"unit": "s", "min": 0}},
          "options": {"legend": {"displayMode": "table", "placement": "bottom", "showLegend": true}},
          "targets": [
            {
              "refId": "A",
              "expr": "iperf3_exporter_duration_seconds{instance=~\"$node\"}",
              "legendFormat": "{{instance}}"
            }
          ]
        }
      ]
    }
