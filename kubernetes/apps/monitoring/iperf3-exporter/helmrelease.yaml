---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: iperf3-exporter
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  values:
    controllers:
      iperf3-exporter:
        type: deployment
        replicas: 1
        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            kubernetes.io/hostname: alexis
        containers:
          app:
            image:
              repository: ghcr.io/edgard/iperf3_exporter
              tag: 1.3.1
            args:
              - --web.listen-address=:9579
              - --iperf3.timeout=20s
            ports:
              - name: http
                containerPort: 9579
                protocol: TCP
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
    service:
      app:
        controller: iperf3-exporter
        ports:
          http:
            port: 9579
    serviceMonitor:
      app:
        service:
          identifier: app
        endpoints:
          - port: http
            scheme: http
            path: /probe
            interval: 30m
            scrapeTimeout: 20s
            params:
              target:
                - 10.99.99.151
              port:
                - "5201"
              period:
                - 10s
            relabelings:
              - action: replace
                sourceLabels:
                  - __meta_kubernetes_pod_node_name
                targetLabel: kubernetes_node
              - action: replace
                sourceLabels:
                  - __meta_kubernetes_pod_node_name
                targetLabel: instance
