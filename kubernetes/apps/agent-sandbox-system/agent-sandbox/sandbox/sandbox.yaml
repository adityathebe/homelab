---
apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: agent-sandbox
spec:
  podTemplate:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: agent
          image: adityathebe/pi-agent-sandbox:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: runtime
              containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 1Gi
            limits:
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: home
              mountPath: /home/node
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      restartPolicy: Never
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsGroup: 1000
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 5
      volumes:
        - name: home
          emptyDir: {}
        - name: workspace
          emptyDir: {}
        - name: tmp
          emptyDir: {}
