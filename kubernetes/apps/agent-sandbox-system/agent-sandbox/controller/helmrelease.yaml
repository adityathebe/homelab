---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
spec:
  interval: 30m
  chart:
    spec:
      chart: ./helm
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: agent-sandbox-controller
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: tmp
                  mountPath: /tmp
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: tmp
                  emptyDir: {}
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    namespace:
      create: false
      name: agent-sandbox-system
    image:
      tag: v0.5.2
    controller:
      extensions: false
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
