---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 30m
  values:
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
        logging:
          level:
            default: warn
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
