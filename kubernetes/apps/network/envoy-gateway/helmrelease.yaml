---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    deployment:
      envoyGateway:
        securityContext:
          runAsNonRoot: true
    config:
      envoyGateway:
        extensionApis:
          enableBackend: true
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
