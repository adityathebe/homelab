---
# Jellyfin
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: homelab-movies
spec:
  endpoints:
    - dnsName: movies.${HOMELAB_DOMAIN}
      recordType: CNAME
      targets:
        - ${CF_TUNNEL_ID}.cfargotunnel.com
---
