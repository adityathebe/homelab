---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    gitea:
      admin:
        username: ""
      config:
        actions:
          ENABLED: true
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        lfs:
          PATH: /data/git/lfs
        log:
          LEVEL: warn
        mailer:
          ENABLED: false
        packages:
          ENABLED: true
        repository:
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
        server:
          APP_DATA_PATH: /data/gitea
          ROOT_URL: https://git.${HOMELAB_DOMAIN}
          SSH_DOMAIN: git.${HOMELAB_DOMAIN}
          SSH_PORT: 22
        service:
          DISABLE_REGISTRATION: false
          REQUIRE_SIGNIN_VIEW: false
        webhook:
          ALLOWED_HOST_LIST: "*"
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
      hostnames:
        - git.${HOMELAB_DOMAIN}
      matches:
        path:
          type: PathPrefix
          value: /
        timeouts:
          request: 300s
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.2-rootless
    persistence:
      enabled: true
      create: false
      claimName: forgejo
    service:
      ssh:
        port: 22
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: ssh
