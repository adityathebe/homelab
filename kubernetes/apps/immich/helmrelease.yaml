---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      server:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: 'true'
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 3000
            runAsGroup: 3000
            fsGroup: 3000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              repository: ghcr.io/immich-app/immich-server
              tag: 'v2.7.5'
            env:
              TZ: ${TZ}
              IMMICH_MEDIA_LOCATION: /usr/src/app/upload
              REDIS_HOSTNAME: immich-valkey
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres
                    key: HOST
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres
                    key: DATABASE
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres
                    key: USER
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres
                    key: PASSWORD
            resources:
              requests:
                cpu: 250m
                memory: 1000Mi
              limits:
                memory: 4000Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      valkey:
        type: deployment
        replicas: 1
        containers:
          app:
            securityContext:
              runAsNonRoot: true
              runAsUser: 999
              runAsGroup: 999
            image:
              repository: docker.io/valkey/valkey
              tag: 9.0
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 512Mi
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      machine-learning:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            env:
              TZ: ${TZ}
              TRANSFORMERS_CACHE: /cache
              HF_XET_CACHE: /cache/huggingface-xet
              MPLCONFIGDIR: /cache/matplotlib-config
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
            resources:
              limits:
                memory: 2750Mi
              requests:
                cpu: 70m
                memory: 1400Mi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    service:
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003
      server:
        controller: server
        ports:
          http:
            port: 2283
      valkey:
        controller: valkey
        ports:
          redis:
            port: 6379
    persistence:
      model-cache:
        existingClaim: immich-model-cache
        advancedMounts:
          machine-learning:
            app:
              - path: /cache
              - path: /.cache
      tmp:
        type: emptyDir
        advancedMounts:
          machine-learning:
            app:
              - path: /tmp
      library:
        existingClaim: immich-library
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload
      gopro:
        existingClaim: gopro
        advancedMounts:
          server:
            app:
              - path: /mnt/external/gopro
                readOnly: true
      external-libraries:
        existingClaim: external-libraries
        advancedMounts:
          server:
            app:
              - path: /mnt/external/libraries
                readOnly: true
    route:
      main:
        hostnames:
          - photos.${HOMELAB_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: server
                port: http
