---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: agent-sandbox
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: agent-sandbox-system
  path: ./kubernetes/apps/agent-sandbox-system/agent-sandbox/sandbox
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: agent-sandbox-controller
  wait: true
  timeout: 10m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
