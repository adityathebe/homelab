---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  targetNamespace: network
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/network/envoy-gateway
  prune: true
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: envoy-gateway
      namespace: network
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-gatewayclass
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  targetNamespace: network
  dependsOn:
    - name: envoy-gateway
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/network/envoy-gateway/gatewayclass
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-gateway
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  targetNamespace: network
  dependsOn:
    - name: envoy-gateway-gatewayclass
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/network/envoy-gateway/gateway
  prune: true
  wait: true
