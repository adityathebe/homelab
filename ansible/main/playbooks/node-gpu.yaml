---
- hosts: gpu_workers
  become: true

  tasks:
    - name: 'install packages for Intel i915 GPU workloads'
      apt:
        name:
          - linux-firmware
          - intel-media-va-driver-non-free
          - intel-gpu-tools
          - mesa-vulkan-drivers
          - vainfo
          - pciutils
          - kmod
        update_cache: yes
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: 'ensure render group exists'
      group:
        name: render
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: 'create udev rule for intel gpu access'
      copy:
        dest: /etc/udev/rules.d/99-intel-gpu.rules
        content: |
          SUBSYSTEM=="drm", KERNEL=="card[0-9]*", GROUP="render", MODE="0666"
          SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="render", MODE="0666"
        mode: '0644'
      notify: reload udev
      when: ansible_facts['os_family'] == "Debian"

    - name: 'load i915 kernel module'
      modprobe:
        name: i915
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: 'ensure i915 module loads on boot'
      lineinfile:
        path: /etc/modules-load.d/intel-gpu.conf
        line: i915
        create: yes
        mode: '0644'
      when: ansible_facts['os_family'] == "Debian"

    - name: 'check Intel GPU PCI device and kernel driver'
      shell: lspci -nnk | grep -Ei 'vga|3d|display' -A3
      register: gpu_driver_check
      changed_when: false
      failed_when: false
      when: ansible_facts['os_family'] == "Debian"

    - name: 'verify i915 kernel module is loaded'
      shell: lsmod | grep '^i915'
      register: i915_module_check
      changed_when: false
      failed_when: false
      when: ansible_facts['os_family'] == "Debian"

    - name: 'verify drm render device exists'
      stat:
        path: /dev/dri/renderD128
      register: dri_render_device
      when: ansible_facts['os_family'] == "Debian"

    - name: 'verify Intel GPU is ready for workloads'
      assert:
        that:
          - "'Kernel driver in use: i915' in gpu_driver_check.stdout"
          - i915_module_check.rc == 0
          - dri_render_device.stat.exists
        fail_msg: 'Intel i915 GPU verification failed. Check lspci, lsmod, and /dev/dri.'
        success_msg: 'Intel i915 GPU is installed and ready.'
      when: ansible_facts['os_family'] == "Debian"

    - name: 'display gpu kernel driver info'
      debug:
        var: gpu_driver_check.stdout_lines
      when: ansible_facts['os_family'] == "Debian" and gpu_driver_check.stdout_lines is defined

  handlers:
    - name: reload udev
      shell: udevadm control --reload-rules && udevadm trigger
